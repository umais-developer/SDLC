<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe with AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Mode Selection Screen -->
    <div id="mode-selector" class="mode-selector">
        <div class="mode-selector-container">
            <h1 class="mode-selector-title">Tic-Tac-Toe with AI</h1>
            <p class="mode-selector-subtitle">Choose a mode to start</p>
            
            <div class="button-group">
                <button id="btn-pvp" class="btn btn-mode btn-pvp-style">
                    Player vs. Player
                </button>
                <button id="btn-easy-ai" class="btn btn-mode btn-easy-ai-style">
                    Play Easy AI
                </button>
                <button id="btn-impossible-ai" class="btn btn-mode btn-impossible-ai-style">
                    Play Impossible AI
                </button>
            </div>
        </div>
    </div>

    <!-- Game Screen (initially hidden) -->
    <div id="game-screen" class="game-screen hidden">
        <div class="game-container">
            <div class="game-header">
                <h2 id="game-title" class="game-title">Tic-Tac-Toe</h2>
                <div id="turn-indicator" class="turn-indicator" aria-live="polite">Your turn</div>
            </div>

            <div id="board" class="board" role="grid">
                <div class="cell" data-index="0" role="button" tabindex="0"></div>
                <div class="cell" data-index="1" role="button" tabindex="0"></div>
                <div class="cell" data-index="2" role="button" tabindex="0"></div>
                <div class="cell" data-index="3" role="button" tabindex="0"></div>
                <div class="cell" data-index="4" role="button" tabindex="0"></div>
                <div class="cell" data-index="5" role="button" tabindex="0"></div>
                <div class="cell" data-index="6" role="button" tabindex="0"></div>
                <div class="cell" data-index="7" role="button" tabindex="0"></div>
                <div class="cell" data-index="8" role="button" tabindex="0"></div>
            </div>

            <div id="scores-overlay" class="scores-overlay hidden"></div>

            <div id="game-status" class="game-status hidden" aria-live="assertive">
                <div class="status-message"></div>
                <button id="btn-rematch" class="btn btn-rematch">Play Again</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
