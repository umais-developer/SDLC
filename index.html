<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 1rem;
      color: #1a1a1a;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    /* ---- Mode Selection ------------------------------------------------- */
    #mode-selection {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    #mode-selection h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .mode-btn {
      padding: 0.65rem 1.5rem;
      font-size: 1rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      min-width: 200px;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn:hover { background: #333; color: #fff; }
    .mode-btn:focus-visible { outline: 3px solid #0066cc; outline-offset: 2px; }
    .mode-btn--active { background: #333; color: #fff; }

    /* ---- Game Board ----------------------------------------------------- */
    #game-board { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }

    #turn-indicator {
      font-size: 1.05rem;
      font-weight: 600;
      min-height: 1.5em;
    }

    #status {
      font-size: 1.2rem;
      font-weight: 700;
      min-height: 1.5em;
      color: #0066cc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: #333;
      border: 4px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .cell {
      background: #fff;
      width: clamp(80px, 24vw, 120px);
      height: clamp(80px, 24vw, 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      position: relative;
      user-select: none;
      transition: background 0.1s;
    }

    .cell:focus-visible { outline: 3px solid #0066cc; outline-offset: -3px; z-index: 1; }
        .cell--win { background: #dff0d8; box-shadow: inset 0 0 0 3px #2a7a2a; font-weight: 900; }
    /* Score overlay */
    .score-overlay {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #555;
      pointer-events: none;
      line-height: 1;
    }

    /* New Game button */
    #new-game-btn {
      margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #new-game-btn:hover { background: #333; color: #fff; }
    #new-game-btn:focus-visible { outline: 3px solid #0066cc; outline-offset: 2px; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>

  <!-- Mode Selection -->
  <section id="mode-selection" aria-labelledby="mode-heading">
    <h2 id="mode-heading">Choose a mode</h2>
    <button class="mode-btn" data-mode="pvp">Player vs Player</button>
    <button class="mode-btn" data-mode="easy">Easy AI</button>
    <button class="mode-btn" data-mode="impossible">Impossible AI</button>
  </section>

  <!-- Game Board -->
  <section id="game-board" hidden aria-label="Game board">
    <div id="turn-indicator" aria-live="polite" aria-atomic="true"></div>
    <div id="status" role="status" aria-live="polite" aria-atomic="true"></div>

    <div class="board" role="grid" aria-label="Tic-Tac-Toe board">
      <button class="cell" role="gridcell" data-index="0" aria-label="Cell 1: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="1" aria-label="Cell 2: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="2" aria-label="Cell 3: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="3" aria-label="Cell 4: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="4" aria-label="Cell 5: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="5" aria-label="Cell 6: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="6" aria-label="Cell 7: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="7" aria-label="Cell 8: empty" tabindex="0"></button>
      <button class="cell" role="gridcell" data-index="8" aria-label="Cell 9: empty" tabindex="0"></button>
    </div>

    <button id="new-game-btn" hidden>New Game</button>
  </section>

  <script>
    // Inline the three modules to avoid requiring a build tool or module bundler.
    // game.js
    (function() {
      'use strict';

      const WIN_LINES = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6],
      ];

      function createGame(mode) {
        return { cells: Array(9).fill(null), current: 'X', mode, status: { type: 'ongoing', winner: null, line: null } };
      }
      function getLegalMoves(state) {
        return state.cells.reduce((a,c,i) => { if (c===null) a.push(i); return a; }, []);
      }
      function checkWinner(cells) {
        for (const [a,b,c] of WIN_LINES) {
          if (cells[a]!==null && cells[a]===cells[b] && cells[a]===cells[c])
            return { type:'win', winner:cells[a], line:[a,b,c] };
        }
        if (cells.every(c=>c!==null)) return { type:'draw', winner:null, line:null };
        return { type:'ongoing', winner:null, line:null };
      }
      function applyMove(state, idx) {
        if (idx < 0 || idx > 8) throw new RangeError('Cell index out of range.');
        if (state.cells[idx] !== null) throw new Error('Cell occupied.');
        if (state.status.type !== 'ongoing') throw new Error('Game is over.');
        const cells = state.cells.slice();
        cells[idx] = state.current;
        return { cells, current: state.current==='X'?'O':'X', mode: state.mode, status: checkWinner(cells) };
      }

      // minimax (plain, no pruning — for score overlay accuracy)
      function minimax(state, isMax) {
        const {type, winner} = state.status;
        if (type==='win') return winner==='O' ? 1 : -1;
        if (type==='draw') return 0;
        const moves = getLegalMoves(state);
        if (isMax) {
          let best = -Infinity;
          for (const m of moves) { best = Math.max(best, minimax(applyMove(state,m), false)); if (best===1) break; }
          return best;
        } else {
          let best = Infinity;
          for (const m of moves) { best = Math.min(best, minimax(applyMove(state,m), true)); if (best===-1) break; }
          return best;
        }
      }

      // minimax with alpha-beta — for AI move selection only
      function minimaxAB(state, alpha, beta, isMax) {
        const {type, winner} = state.status;
        if (type==='win') return winner==='O' ? 1 : -1;
        if (type==='draw') return 0;
        const moves = getLegalMoves(state);
        if (isMax) {
          let best = -Infinity;
          for (const m of moves) {
            best = Math.max(best, minimaxAB(applyMove(state,m), alpha, beta, false));
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
          }
          return best;
        } else {
          let best = Infinity;
          for (const m of moves) {
            best = Math.min(best, minimaxAB(applyMove(state,m), alpha, beta, true));
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
          }
          return best;
        }
      }

      function easyBestMove(state) {
        const moves = getLegalMoves(state);
        return moves[Math.floor(Math.random() * moves.length)];
      }
      function impossibleBestMove(state) {
        const moves = getLegalMoves(state);
        let bestScore = -Infinity, bestMove = moves[0];
        for (const m of moves) {
          const score = minimaxAB(applyMove(state,m), -Infinity, Infinity, false);
          if (score > bestScore) { bestScore = score; bestMove = m; }
        }
        return bestMove;
      }
      function scoreAllMoves(state) {
        const scores = {};
        for (const m of getLegalMoves(state)) {
          scores[m] = minimax(applyMove(state,m), false);
        }
        return scores;
      }

      // ---- UIController ----
      const OVERLAY_MS = 150; // ms the score overlay is visible before AI commits move
      const COPY = {
        turnX:"X's turn", turnO:"O's turn",
        winsX:'X wins!', winsO:'O wins!', draw:"It's a draw!",
        newGame:'New Game',
      };

      let gameState = null;
      let lastMode  = null;
      let aiLocked  = false;

      const cellEls    = Array.from(document.querySelectorAll('.cell'));
      const statusEl   = document.getElementById('status');
      const turnEl     = document.getElementById('turn-indicator');
      const newGameBtn = document.getElementById('new-game-btn');
      const modeScreen = document.getElementById('mode-selection');
      const boardEl    = document.getElementById('game-board');

      function render(state) {
        const { cells, current, status } = state;
        cellEls.forEach((el, i) => {
          el.textContent = '';
          if (cells[i]) {
            const sym = document.createTextNode(cells[i]);
            el.appendChild(sym);
          }
          const isEmpty = cells[i] === null;
          const over    = status.type !== 'ongoing';
          el.setAttribute('aria-label', cells[i] ? `Cell ${i+1}: ${cells[i]}` : `Cell ${i+1}: empty`);
          el.setAttribute('aria-disabled', String(!isEmpty || over));
          el.classList.toggle('cell--filled', !isEmpty);
          el.classList.toggle('cell--inert',  over || !isEmpty);
          el.style.cursor = (isEmpty && !over) ? 'pointer' : 'default';
          el.setAttribute('tabindex', (isEmpty && !over) ? '0' : '-1');
        });
        cellEls.forEach(el => el.classList.remove('cell--win'));
        if (status.line) status.line.forEach(i => cellEls[i].classList.add('cell--win'));

        if (status.type === 'ongoing') {
          turnEl.textContent = current === 'X' ? COPY.turnX : COPY.turnO;
          statusEl.textContent = '';
          newGameBtn.hidden = true;
        } else {
          turnEl.textContent = '';
          statusEl.textContent = status.winner==='X' ? COPY.winsX : status.winner==='O' ? COPY.winsO : COPY.draw;
          newGameBtn.hidden = false;
        }
      }

      function renderOverlay(scores) {
        cellEls.forEach((el, i) => {
          if (Object.prototype.hasOwnProperty.call(scores, i)) {
            const span = document.createElement('span');
            span.className = 'score-overlay';
            span.textContent = scores[i];
            span.setAttribute('aria-label', `Minimax score: ${scores[i]}`);
            el.appendChild(span);
          }
        });
      }

      function clearOverlay() {
        cellEls.forEach(el => el.querySelectorAll('.score-overlay').forEach(s => s.remove()));
      }

      function showModeSelection() {
        modeScreen.hidden = false;
        boardEl.hidden    = true;
        statusEl.textContent = '';
        turnEl.textContent   = '';
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.classList.toggle('mode-btn--active', btn.dataset.mode === lastMode);
        });
      }

      function startGame(mode) {
        lastMode  = mode;
        gameState = createGame(mode);
        modeScreen.hidden = true;
        boardEl.hidden    = false;
        aiLocked = false;
        render(gameState);
      }

      function handleCell(idx) {
        if (!gameState || gameState.status.type !== 'ongoing') return;
        if (gameState.cells[idx] !== null) return;
        if (aiLocked) return;

        gameState = applyMove(gameState, idx);
        render(gameState);
        if (gameState.status.type !== 'ongoing') return;

        if (gameState.mode === 'easy') {
          aiLocked = true;
          const m = easyBestMove(gameState);
          gameState = applyMove(gameState, m);
          render(gameState);
          aiLocked = false;
        } else if (gameState.mode === 'impossible') {
          aiLocked = true;
          const scores = scoreAllMoves(gameState);
          renderOverlay(scores);
          setTimeout(() => {
            clearOverlay();
            const m = impossibleBestMove(gameState);
            gameState = applyMove(gameState, m);
            render(gameState);
            aiLocked = false;
          }, OVERLAY_MS);
        }
      }

      // Wire cells
      cellEls.forEach((el, i) => {
        el.addEventListener('click', () => handleCell(i));
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCell(i); }
        });
      });

      // Wire mode buttons
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => startGame(btn.dataset.mode));
      });

      // Wire new-game button
      newGameBtn.addEventListener('click', showModeSelection);
    })();
  </script>
</body>
</html>
