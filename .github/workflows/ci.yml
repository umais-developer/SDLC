name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: pip install jsonschema

      - name: Run verifier smoke test
        run: python .agents/tests/run_verifiers.py

      - name: Run drift check
        run: python .agents/tests/check_drift.py
