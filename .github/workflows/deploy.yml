name: Deploy to GitHub Pages

on:
  push:
    branches: ['deploy/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract app name from branch
        id: extract
        run: echo "app_name=${GITHUB_REF#refs/heads/deploy/}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.extract.outputs.app_name }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ steps.extract.outputs.app_name }}

      - name: Run unit tests
        run: npm test
        working-directory: ${{ steps.extract.outputs.app_name }}

      - name: Build
        run: npm run build -- --base /SDLC/
        working-directory: ${{ steps.extract.outputs.app_name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.extract.outputs.app_name }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract app name from branch
        id: extract
        run: echo "app_name=${GITHUB_REF#refs/heads/deploy/}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install @playwright/test
        working-directory: ${{ steps.extract.outputs.app_name }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ${{ steps.extract.outputs.app_name }}

      - name: Wait for GitHub Pages to propagate
        run: sleep 30

      - name: Run smoke tests against live deployment
        run: npx playwright test
        working-directory: ${{ steps.extract.outputs.app_name }}
        env:
          PLAYWRIGHT_BASE_URL: https://umais-developer.github.io/SDLC/

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.extract.outputs.app_name }}
          path: ${{ steps.extract.outputs.app_name }}/playwright-report/
          retention-days: 7
