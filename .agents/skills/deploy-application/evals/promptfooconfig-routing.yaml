# .agents/skills/deploy-application/evals/promptfooconfig-routing.yaml
description: "Deploy Application Skill — Description / Skill Routing Evaluation"

prompts:
  - "{{request}}"    # bare user turn — no system prompt, just the request

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: Claude Sonnet 4.6
    config:
      temperature: 0        # deterministic for routing decisions
      tools:
        - type: function
          function:
            name: deploy_application
            # This description must match the description in the prompt front matter.
            # When you update the description there, update it here to match.
            description: >
              Deploy the built React app to GitHub Pages — creates the
              repo/branch if needed, commits all source files, sets up the
              GitHub Actions workflow, and returns the live URL.
            parameters:
              type: object
              properties:
                request:
                  type: string
                  description: The deployment request or app directory to deploy.
              required: [request]

tests: file://cases-routing.yaml
