# .agents/skills/deploy-application/evals/cases.yaml

- description: "Static React/Vite app — should produce full deployment plan"
  vars:
    request: |
      App directory: my-todo-app/
      The app is a React + Vite + TypeScript project with a vite.config.ts that has base: '/'.
      The GitHub remote is https://github.com/acme/my-todo-app.git
      Describe the deployment steps you would take.

      [Eval context: no workspace tools are available. Do not call any tools. Describe the steps only.]
  assert:
    - type: icontains
      value: "deploy"
    - type: icontains
      value: "vite.config"
    - type: icontains
      value: "github pages"
    - type: icontains
      value: "deploy/"
    - type: icontains
      value: "npm run build"
    - type: javascript
      value: output.split(' ').length > 100
    - type: llm-rubric
      value: >
        The response describes patching the vite.config.ts base path to match
        the GitHub Pages URL (e.g. '/my-todo-app/' or the repo name).
      threshold: 0.8
    - type: llm-rubric
      value: >
        The response describes creating a deploy/<app-name> branch and
        committing source files to it, without touching main.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The response describes a GitHub Actions workflow that runs npm ci,
        npm test, npm run build, and then deploys the dist/ folder to
        GitHub Pages.
      threshold: 0.8

- description: "Server-side app (Express + PostgreSQL) — should abort with warning"
  vars:
    request: |
      App directory: backend-api/
      architecture_final.md mentions: Express.js server, PostgreSQL database,
      REST API endpoints under /api/, JWT authentication with server-side secrets.
      Should I deploy this to GitHub Pages?

      [Eval context: no workspace tools are available. Do not call any tools. Answer directly.]
  assert:
    - type: icontains
      value: "⚠️"
    - type: not-icontains
      value: "npm run build"
    - type: not-icontains
      value: "gh-pages"
    - type: llm-rubric
      value: >
        The response clearly refuses to deploy to GitHub Pages and explains
        that the app requires a server due to Express and PostgreSQL.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response recommends at least one alternative hosting platform
        suitable for server-side apps (e.g., Vercel, Render, Railway,
        Fly.io, Azure App Service, Heroku, or AWS).
      threshold: 0.9

- description: ".NET MVC app — should abort with warning"
  vars:
    request: |
      App directory: dotnet-crm/
      The architecture doc references ASP.NET Core MVC, SQL Server, Entity Framework,
      and appsettings.json with a connection string.
      Can this be deployed to GitHub Pages?

      [Eval context: no workspace tools are available. Do not call any tools. Answer directly.]
  assert:
    - type: icontains
      value: "⚠️"
    - type: not-icontains
      value: "vite.config"
    - type: not-icontains
      value: "npm run build"
    - type: llm-rubric
      value: >
        The response clearly refuses GitHub Pages deployment because ASP.NET Core
        MVC requires a server runtime and SQL Server is a server-side database.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response recommends at least one platform that supports .NET
        workloads (e.g., Azure App Service, Render, Railway, or AWS).
      threshold: 0.8

- description: "Java Spring Boot app — should abort with warning"
  vars:
    request: |
      App directory: spring-api/
      The architecture mentions Spring Boot, Hibernate ORM, Oracle DB, and a
      pom.xml build file.
      Deploy this to GitHub Pages.

      [Eval context: no workspace tools are available. Do not call any tools. Answer directly.]
  assert:
    - type: icontains
      value: "⚠️"
    - type: not-icontains
      value: "peaceiris"
    - type: not-icontains
      value: "deploy-pages"
    - type: llm-rubric
      value: >
        The response refuses deployment to GitHub Pages due to Spring Boot
        requiring a JVM runtime and Oracle DB being a server-side database.
      threshold: 0.9

- description: "PHP Laravel app — should abort with warning"
  vars:
    request: |
      App directory: laravel-shop/
      The project has a composer.json, uses Laravel with MySQL and Eloquent ORM.
      Deploy to GitHub Pages.

      [Eval context: no workspace tools are available. Do not call any tools. Answer directly.]
  assert:
    - type: icontains
      value: "⚠️"
    - type: not-icontains
      value: "vite.config"
    - type: llm-rubric
      value: >
        The response refuses deployment because Laravel is a server-side PHP
        framework and cannot run on GitHub Pages.
      threshold: 0.9

- description: "Workflow file already exists — should not overwrite it"
  vars:
    request: |
      App directory: my-portfolio/
      A .github/workflows/deploy.yml already exists and is correctly configured
      for this React/Vite app with base: '/my-portfolio/'.
      What deployment steps are needed?

      [Eval context: no workspace tools are available. Do not call any tools. Answer directly.]
  assert:
    - type: llm-rubric
      value: >
        The response notes that the existing deploy.yml will not be overwritten
        and that the existing workflow is reused as-is.
      threshold: 0.8
    - type: not-icontains
      value: "create the workflow"
