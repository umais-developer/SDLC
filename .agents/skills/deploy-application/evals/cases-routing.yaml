# .agents/skills/deploy-application/evals/cases-routing.yaml

# --- Positive cases: skill SHOULD be invoked ---

- description: "Routing — explicit deploy request should invoke deploy_application"
  vars:
    request: "Deploy my React app to GitHub Pages."
  assert:
    - type: javascript
      value: output.includes('deploy_application')
      metric: skill_invoked

- description: "Routing — push to GitHub and publish should invoke deploy_application"
  vars:
    request: "I've finished building my Vite app. Push it to GitHub and get it live."
  assert:
    - type: javascript
      value: output.includes('deploy_application')
      metric: skill_invoked

- description: "Routing — set up CI/CD for GitHub Pages should invoke deploy_application"
  vars:
    request: "Set up a GitHub Actions workflow to deploy my React app to GitHub Pages automatically."
  assert:
    - type: javascript
      value: output.includes('deploy_application')
      metric: skill_invoked

- description: "Routing — make app publicly accessible should invoke deploy_application"
  vars:
    request: "My Vite + React app is built. Make it accessible on a public URL using GitHub Pages."
  assert:
    - type: javascript
      value: output.includes('deploy_application')
      metric: skill_invoked

- description: "Routing — get a live URL should invoke deploy_application"
  vars:
    request: "I need a shareable link for my React app. Use GitHub Pages."
  assert:
    - type: javascript
      value: output.includes('deploy_application')
      metric: skill_invoked

# --- Negative cases: skill should NOT be invoked ---

- description: "Routing — asking about PRD should NOT invoke deploy_application"
  vars:
    request: "Write a PRD for a new user onboarding feature."
  assert:
    - type: javascript
      value: "!output.includes('deploy_application')"
      metric: skill_not_invoked

- description: "Routing — asking about code review should NOT invoke deploy_application"
  vars:
    request: "Review my implementation and check for bugs."
  assert:
    - type: javascript
      value: "!output.includes('deploy_application')"
      metric: skill_not_invoked

- description: "Routing — asking about architecture should NOT invoke deploy_application"
  vars:
    request: "Design the system architecture for a real-time chat app."
  assert:
    - type: javascript
      value: "!output.includes('deploy_application')"
      metric: skill_not_invoked

- description: "Routing — asking to write user stories should NOT invoke deploy_application"
  vars:
    request: "Break down the requirements into epics and user stories."
  assert:
    - type: javascript
      value: "!output.includes('deploy_application')"
      metric: skill_not_invoked
