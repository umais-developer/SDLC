# .agents/skills/create-prd/evals/cases.yaml

- description: "Simple feature request — email order notifications"
  vars:
    request: "We need to add email notifications when a user's order ships."
  assert:
    # Deterministic checks (fast, free)
    - type: icontains
      value: "overview"
    - type: icontains
      value: "user stories"
    - type: icontains
      value: "out of scope"
    - type: icontains
      value: "functional requirements"
    - type: icontains
      value: "success metrics"
    - type: javascript
      value: output.split(' ').length > 150   # must be substantive
    # LLM-as-judge checks (slower, costs tokens)
    - type: llm-rubric
      value: >
        The PRD contains at least three user stories in the format
        "As a [user], I want [action] so that [benefit]."
      threshold: 0.8
    - type: llm-rubric
      value: >
        The functional requirements section contains a numbered or tabular list
        of specific, testable behaviors.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The goals and success metrics section contains at least one measurable,
        numeric target (e.g., percentage, count, or time-boxed goal).
      threshold: 0.75

- description: "Ambiguous request — should still produce a complete PRD"
  vars:
    request: "Make the dashboard better."
  assert:
    - type: icontains
      value: "overview"
    - type: icontains
      value: "goals"
    - type: icontains
      value: "assumptions"
    - type: javascript
      value: output.split('\n').length > 20   # multi-section output
    - type: llm-rubric
      value: >
        Despite the vague input, the PRD makes reasonable assumptions explicit
        and proposes concrete, actionable requirements rather than vague
        statements like "improve the dashboard".
      threshold: 0.7
    - type: llm-rubric
      value: >
        The PRD flags at least one open question or marks at least one section
        with [TBD] to indicate that more input is needed.
      threshold: 0.7

- description: "Technical feature — API rate limiting"
  vars:
    request: "Add rate limiting to our public REST API — 100 requests per minute per API key."
  assert:
    - type: icontains
      value: "functional requirements"
    - type: icontains
      value: "success metrics"
    - type: icontains
      value: "out of scope"
    - type: javascript
      value: output.includes('100')   # must reference the stated limit
    - type: llm-rubric
      value: >
        The PRD includes specific technical details about the rate limit
        (100 requests per minute) and describes how violations will be handled
        (e.g., 429 status code, retry-after header, or similar).
      threshold: 0.8
    - type: llm-rubric
      value: >
        The out of scope section is present and meaningful — it excludes at least
        one related concern (e.g., authentication, billing, monitoring, or
        client-side throttling).
      threshold: 0.7
    - type: llm-rubric
      value: >
        The PRD does not prescribe a specific technical implementation (e.g., does
        not mandate Redis, Nginx, or a specific algorithm) unless explicitly asked.
      threshold: 0.8

- description: "User-facing onboarding feature — guided setup wizard"
  vars:
    request: "Users are dropping off during onboarding. We want to add a guided setup wizard."
  assert:
    - type: icontains
      value: "problem statement"
    - type: icontains
      value: "user personas"
    - type: icontains
      value: "release criteria"
    - type: javascript
      value: output.split(' ').length > 200
    - type: llm-rubric
      value: >
        The problem statement references the drop-off issue and identifies
        the affected user persona (new users / onboarding users).
      threshold: 0.8
    - type: llm-rubric
      value: >
        The PRD includes at least one success metric tied to reducing drop-off
        or improving onboarding completion (e.g., completion rate, time-to-activate).
      threshold: 0.8
