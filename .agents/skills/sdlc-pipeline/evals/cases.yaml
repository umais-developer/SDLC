# .agents/skills/sdlc-pipeline/evals/cases.yaml

# --- Resume detection: correct stage identification ---

- description: "Fresh workspace — no artifacts, should start at Stage 1 (PRD)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: No _final.md files exist in the workspace. This is a completely fresh start.
  assert:
    - type: icontains
      value: "Stage 1"
    - type: icontains
      value: "PRD"
    - type: llm-rubric
      value: >
        The response identifies Stage 1 (create-prd) as the resume point and
        does not skip to any later stage.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response lists all 7 pipeline stages in the correct order:
        PRD, Architecture, UX, Epics & Stories, Plan, Implement, Review.
      threshold: 0.8

- description: "PRD exists — should resume at Stage 2 (Architecture)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS. architecture_final.md does NOT exist.
  assert:
    - type: icontains
      value: "Stage 2"
    - type: llm-rubric
      value: >
        The response identifies Stage 2 (create-architecture) as the resume point
        because prd_final.md is already present.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response states that Stage 1 (PRD) is already complete and will not
        be regenerated or overwritten.
      threshold: 0.85

- description: "PRD + Architecture exist — should resume at Stage 3 (UX)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS. architecture_final.md EXISTS. ux_final.md does NOT exist.
  assert:
    - type: icontains
      value: "Stage 3"
    - type: llm-rubric
      value: >
        The response identifies Stage 3 (create-ux) as the resume point.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response treats Stages 1 and 2 as already complete and does not
        attempt to regenerate prd_final.md or architecture_final.md.
      threshold: 0.85

- description: "PRD + Architecture + UX exist — should resume at Stage 4 (Epics & Stories)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS. architecture_final.md EXISTS. ux_final.md EXISTS. epics_stories_final.md does NOT exist.
  assert:
    - type: icontains
      value: "Stage 4"
    - type: llm-rubric
      value: >
        The response identifies Stage 4 (create-epics-stories) as the resume point.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response treats Stages 1, 2, and 3 as already complete.
      threshold: 0.85

- description: "PRD through UX + Epics exist — should resume at Stage 5 (Plan)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS. architecture_final.md EXISTS. ux_final.md EXISTS. epics_stories_final.md EXISTS. plan_story_final.md does NOT exist.
  assert:
    - type: icontains
      value: "Stage 5"
    - type: llm-rubric
      value: >
        The response identifies Stage 5 (plan-story) as the resume point.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response treats Stages 1 through 4 as already complete and does not
        attempt to regenerate any of the existing artifact files.
      threshold: 0.85

- description: "All 5 artifacts exist — should resume at Stage 6 (Implement)"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS. architecture_final.md EXISTS. ux_final.md EXISTS. epics_stories_final.md EXISTS. plan_story_final.md EXISTS.
  assert:
    - type: icontains
      value: "Stage 6"
    - type: llm-rubric
      value: >
        The response identifies Stage 6 (implement-story) as the resume point
        because all five artifact files are already present.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response does not propose regenerating any of the five existing
        artifact files.
      threshold: 0.85

# --- Sequencing integrity ---

- description: "Sequencing — full pipeline plan lists all stages in correct order"
  vars:
    request: |
      Feature: Build an in-app notification centre showing recent activity.

      Workspace artifact state: No _final.md files exist. This is a fresh start.
  assert:
    - type: llm-rubric
      value: >
        The response presents the 7 stages in the correct order without
        skipping or reordering: (1) PRD, (2) Architecture, (3) UX,
        (4) Epics & Stories, (5) Plan Story, (6) Implement, (7) Review.
      threshold: 0.9
    - type: llm-rubric
      value: >
        The response announces the detected resume point before describing
        what will happen next — it does not silently start executing.
      threshold: 0.8

# --- No-overwrite protection ---

- description: "No-overwrite — existing artifact should be used as context, not regenerated"
  vars:
    request: |
      Feature: Add a dark mode toggle to the user settings page.

      Workspace artifact state: prd_final.md EXISTS with content already written. architecture_final.md does NOT exist.
  assert:
    - type: llm-rubric
      value: >
        The response explicitly states it will read prd_final.md as existing
        context rather than recreating or overwriting it.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The response does not say it will write or save a new prd_final.md.
      threshold: 0.85

# --- Missing input handling ---

- description: "Missing feature description — should ask for clarification"
  vars:
    request: |
      Workspace artifact state: No _final.md files exist.

      [No feature description provided.]
  assert:
    - type: llm-rubric
      value: >
        The response asks the user for a feature description or problem statement
        before proceeding, rather than inventing one.
      threshold: 0.85
