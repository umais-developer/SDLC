# .agents/skills/sdlc-pipeline/evals/promptfooconfig-routing.yaml
description: "SDLC Pipeline — Description / Skill Routing Evaluation"

prompts:
  - "{{request}}"    # bare user turn — no system prompt, just the request

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: Claude Sonnet 4.6
    config:
      temperature: 0        # deterministic for routing decisions
      tools:
        # The pipeline command — should be chosen for full end-to-end requests
        - type: function
          function:
            name: sdlc_pipeline
            # This description must match the description in sdlc-pipeline.prompt.md front matter.
            # When you update the description there, update it here to match.
            description: >
              Runs the full SDLC pipeline (PRD → Architecture → UX → Epics/Stories →
              Plan → Implement → Review) for a feature or initiative, automatically
              detecting completed stages and resuming from the correct point. Use when
              the user wants to execute multiple or all SDLC stages end-to-end rather
              than a single specific stage.
            parameters:
              type: object
              properties:
                request:
                  type: string
                  description: The feature or initiative description to run through the full pipeline.
              required: [request]
        # Individual stage commands — present so the model has a real choice to make
        - type: function
          function:
            name: create_prd
            description: >
              Creates a structured Product Requirements Document (PRD) from a
              feature request or problem statement. Use when only a PRD is needed,
              not the full pipeline.
            parameters:
              type: object
              properties:
                request:
                  type: string
              required: [request]
        - type: function
          function:
            name: create_architecture
            description: >
              Generates a system architecture document for a feature or component.
              Use when only an architecture document is needed.
            parameters:
              type: object
              properties:
                request:
                  type: string
              required: [request]
        - type: function
          function:
            name: plan_story
            description: >
              Breaks down a user story into a concrete implementation plan.
              Use when only a story plan is needed.
            parameters:
              type: object
              properties:
                request:
                  type: string
              required: [request]

tests: file://cases-routing.yaml
