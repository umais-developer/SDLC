# .agents/skills/sdlc-pipeline/evals/cases-routing.yaml

# --- Positive cases: sdlc_pipeline SHOULD be invoked ---

- description: "Routing — explicit full pipeline request should invoke sdlc_pipeline"
  vars:
    request: "Run the full SDLC pipeline for a new user notification centre feature."
  assert:
    - type: javascript
      value: output.includes('sdlc_pipeline')
      metric: skill_invoked

- description: "Routing — end-to-end request should invoke sdlc_pipeline"
  vars:
    request: "I want to go end-to-end on building a dark mode toggle — from PRD all the way through to implementation."
  assert:
    - type: javascript
      value: output.includes('sdlc_pipeline')
      metric: skill_invoked

- description: "Routing — 'entire SDLC' phrasing should invoke sdlc_pipeline"
  vars:
    request: "Take me through the entire SDLC for adding rate limiting to our public API."
  assert:
    - type: javascript
      value: output.includes('sdlc_pipeline')
      metric: skill_invoked

- description: "Routing — 'all stages' phrasing should invoke sdlc_pipeline"
  vars:
    request: "Run all the stages for the onboarding wizard feature — PRD, architecture, stories, everything."
  assert:
    - type: javascript
      value: output.includes('sdlc_pipeline')
      metric: skill_invoked

- description: "Routing — resume pipeline request should invoke sdlc_pipeline"
  vars:
    request: "Resume the pipeline for the checkout redesign — I already have the PRD done."
  assert:
    - type: javascript
      value: output.includes('sdlc_pipeline')
      metric: skill_invoked

# --- Negative cases: sdlc_pipeline should NOT be invoked ---

- description: "Routing — single-stage PRD request should NOT invoke sdlc_pipeline"
  vars:
    request: "Create a PRD for adding email notifications when an order ships."
  assert:
    - type: javascript
      value: "!output.includes('sdlc_pipeline')"
      metric: skill_not_invoked

- description: "Routing — architecture-only request should NOT invoke sdlc_pipeline"
  vars:
    request: "I just need the architecture document for the payment service refactor."
  assert:
    - type: javascript
      value: "!output.includes('sdlc_pipeline')"
      metric: skill_not_invoked

- description: "Routing — story planning request should NOT invoke sdlc_pipeline"
  vars:
    request: "Plan out this user story: as a user I want to reset my password via email."
  assert:
    - type: javascript
      value: "!output.includes('sdlc_pipeline')"
      metric: skill_not_invoked

- description: "Routing — general coding question should NOT invoke sdlc_pipeline"
  vars:
    request: "How do I implement optimistic UI updates in React?"
  assert:
    - type: javascript
      value: "!output.includes('sdlc_pipeline')"
      metric: skill_not_invoked

- description: "Routing — bug report should NOT invoke sdlc_pipeline"
  vars:
    request: "The login button is broken on iOS 17. Users get a blank screen after tapping."
  assert:
    - type: javascript
      value: "!output.includes('sdlc_pipeline')"
      metric: skill_not_invoked
