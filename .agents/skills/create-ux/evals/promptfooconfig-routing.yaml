# .agents/skills/create-ux/evals/promptfooconfig-routing.yaml
description: "UX Design Skill — Description / Skill Routing Evaluation"

prompts:
  - "{{request}}"    # bare user turn — no system prompt, just the request

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: Claude Sonnet 4.6
    config:
      temperature: 0        # deterministic for routing decisions
      tools:
        - type: function
          function:
            name: create_ux
            # This description must match the description in create-ux.prompt.md front matter.
            # When you update the description there, update it here to match.
            description: >
              Generates UX design guidance including user flows, interaction
              patterns, and design considerations for a feature. Use when the
              user needs to design or document the user experience, user flows,
              interaction states, accessibility requirements, or microcopy for
              a new or existing feature.
            parameters:
              type: object
              properties:
                request:
                  type: string
                  description: The feature or problem to produce UX design guidance for.
              required: [request]

tests: file://cases-routing.yaml
