# .agents/skills/create-architecture/evals/cases.yaml

- description: "Simple feature — email notification service"
  vars:
    request: "Design the architecture for an email notification service that sends order shipment alerts to users."
  assert:
    # Deterministic checks (fast, free)
    - type: icontains
      value: "overview"
    - type: icontains
      value: "component"
    - type: icontains
      value: "data flow"
    - type: icontains
      value: "security"
    - type: icontains
      value: "scalability"
    - type: javascript
      value: output.split(' ').length > 200
    # LLM-as-judge checks
    - type: llm-rubric
      value: >
        The document identifies at least two distinct components (e.g., API,
        queue, worker, email provider) and describes the responsibility of each.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The data flow section describes how a notification is triggered and
        delivered end-to-end, in sequential steps.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The security section addresses at least one of: authentication,
        data in transit encryption, or PII handling for email addresses.
      threshold: 0.75

- description: "Ambiguous request — should still produce a complete document"
  vars:
    request: "We need to redesign the backend."
  assert:
    - type: icontains
      value: "overview"
    - type: icontains
      value: "assumptions"
    - type: icontains
      value: "open questions"
    - type: javascript
      value: output.split('\n').length > 25
    - type: llm-rubric
      value: >
        Despite the vague input, the document makes explicit assumptions about
        scope and proposes a concrete set of components or layers rather than
        vague statements like "improve the backend".
      threshold: 0.7
    - type: llm-rubric
      value: >
        The document flags at least one open question or marks at least one
        section with [TBD] indicating more input is needed.
      threshold: 0.7

- description: "Technical feature — API rate limiting"
  vars:
    request: "Design the architecture for rate limiting our public REST API at 100 requests per minute per API key."
  assert:
    - type: icontains
      value: "component"
    - type: icontains
      value: "data flow"
    - type: icontains
      value: "scalability"
    - type: javascript
      value: output.includes('100')
    - type: llm-rubric
      value: >
        The architecture includes a component or layer responsible for enforcing
        the rate limit and describes how it tracks request counts per API key.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The non-goals or out-of-scope section is present and excludes at least
        one related concern (e.g., authentication, billing, or DDoS protection).
      threshold: 0.7
    - type: llm-rubric
      value: >
        The document does not prescribe a specific vendor implementation
        (e.g., does not mandate Redis, Nginx, or AWS WAF) unless the stack
        context makes it clearly appropriate.
      threshold: 0.8

- description: "Multi-tier feature — user onboarding wizard"
  vars:
    request: "Design the architecture for a guided onboarding wizard that walks new users through account setup across web and mobile."
  assert:
    - type: icontains
      value: "component"
    - type: icontains
      value: "api"
    - type: icontains
      value: "data model"
    - type: icontains
      value: "security"
    - type: javascript
      value: output.split(' ').length > 250
    - type: llm-rubric
      value: >
        The architecture accounts for both web and mobile clients and describes
        how state is persisted between onboarding steps.
      threshold: 0.8
    - type: llm-rubric
      value: >
        The security section mentions authentication or session handling
        for the onboarding flow.
      threshold: 0.75
    - type: llm-rubric
      value: >
        The document includes at least one Mermaid diagram (context or sequence)
        or a clear textual description of the system boundaries.
      threshold: 0.7
