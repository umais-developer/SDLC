# .agents/skills/create-architecture/evals/cases-routing.yaml

# --- Positive cases: skill SHOULD be invoked ---

- description: "Routing — explicit architecture request should invoke create_architecture"
  vars:
    request: "Design the architecture for an email notification service."
  assert:
    - type: javascript
      value: output.includes('create_architecture')
      metric: skill_invoked

