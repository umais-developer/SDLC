# .agents/skills/implement-story/evals/cases-routing.yaml

# --- Positive cases: skill SHOULD be invoked ---

- description: "Routing — explicit implement request should invoke implement_story"
  vars:
    request: "Implement this user story: As a customer, I want to receive an email when my order ships."
  assert:
    - type: javascript
      value: output.includes('implement_story')
      metric: skill_invoked

- description: "Routing — code the story request should invoke implement_story"
  vars:
    request: "Write the code for the rate limiting story based on the implementation plan."
  assert:
    - type: javascript
      value: output.includes('implement_story')
      metric: skill_invoked

- description: "Routing — build the feature request should invoke implement_story"
  vars:
    request: "Build the onboarding profile form — here are the acceptance criteria and plan."
  assert:
    - type: javascript
      value: output.includes('implement_story')
      metric: skill_invoked

- description: "Routing — story with AC ready to code should invoke implement_story"
  vars:
    request: "The story is planned and ready. Go ahead and implement it with tests."
  assert:
    - type: javascript
      value: output.includes('implement_story')
      metric: skill_invoked

- description: "Routing — implement and test request should invoke implement_story"
  vars:
    request: "Implement the password reset story and write unit tests for it."
  assert:
    - type: javascript
      value: output.includes('implement_story')
      metric: skill_invoked

# --- Negative cases: skill should NOT be invoked ---

- description: "Routing — story planning request should NOT invoke implement_story"
  vars:
    request: "Plan the implementation tasks for the email notification story."
  assert:
    - type: javascript
      value: "!output.includes('implement_story')"
      metric: skill_not_invoked

- description: "Routing — PRD request should NOT invoke implement_story"
  vars:
    request: "Write a PRD for the password reset feature."
  assert:
    - type: javascript
      value: "!output.includes('implement_story')"
      metric: skill_not_invoked

- description: "Routing — architecture request should NOT invoke implement_story"
  vars:
    request: "Design the system architecture for the notification service."
  assert:
    - type: javascript
      value: "!output.includes('implement_story')"
      metric: skill_not_invoked

- description: "Routing — bug report should NOT invoke implement_story"
  vars:
    request: "The password reset emails are not being delivered to Gmail addresses."
  assert:
    - type: javascript
      value: "!output.includes('implement_story')"
      metric: skill_not_invoked
