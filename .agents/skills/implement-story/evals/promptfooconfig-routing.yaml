# .agents/skills/implement-story/evals/promptfooconfig-routing.yaml
description: "Implement Story Skill — Description / Skill Routing Evaluation"

prompts:
  - "{{request}}"    # bare user turn — no system prompt, just the request

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: Claude Sonnet 4.6
    config:
      temperature: 0        # deterministic for routing decisions
      tools:
        - type: function
          function:
            name: implement_story
            # This description must match the description in implement-story.prompt.md front matter.
            # When you update the description there, update it here to match.
            description: >
              Implements a user story by writing working, tested code that
              satisfies the acceptance criteria, guided by the implementation
              plan. Use when the user is ready to write code for a specific
              user story and has acceptance criteria available.
            parameters:
              type: object
              properties:
                request:
                  type: string
                  description: The user story, acceptance criteria, and implementation plan to implement.
              required: [request]

tests: file://cases-routing.yaml
