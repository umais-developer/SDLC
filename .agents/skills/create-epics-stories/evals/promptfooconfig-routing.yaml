# .agents/skills/create-epics-stories/evals/promptfooconfig-routing.yaml
description: "Epics & Stories Skill — Description / Skill Routing Evaluation"

prompts:
  - "{{request}}"    # bare user turn — no system prompt, just the request

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: Claude Sonnet 4.6
    config:
      temperature: 0        # deterministic for routing decisions
      tools:
        - type: function
          function:
            name: create_epics_stories
            # This description must match the description in create-epics-stories.prompt.md front matter.
            # When you update the description there, update it here to match.
            description: >
              Breaks down a feature or PRD into epics and user stories.
              Use when the user needs to decompose a feature, initiative, or
              product requirement into sprint-ready work items for an
              engineering backlog.
            parameters:
              type: object
              properties:
                request:
                  type: string
                  description: The feature, PRD, or requirement to break down into epics and user stories.
              required: [request]

tests: file://cases-routing.yaml
