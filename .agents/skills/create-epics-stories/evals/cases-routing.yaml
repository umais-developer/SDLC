# .agents/skills/create-epics-stories/evals/cases-routing.yaml

# --- Positive cases: skill SHOULD be invoked ---

- description: "Routing — explicit breakdown request should invoke create_epics_stories"
  vars:
    request: "Break down the email notification feature into epics and user stories."
  assert:
    - type: javascript
      value: output.includes('create_epics_stories')
      metric: skill_invoked

- description: "Routing — backlog creation request should invoke create_epics_stories"
  vars:
    request: "Create user stories for the onboarding wizard so the team can start sprint planning."
